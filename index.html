<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiempo y Elegancia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>
    <style>
        /* Estilos básicos para que se vea algo */
        body { background: #1e1e1c; color: white; font-family: sans-serif; padding: 2rem; }
        .catalog { max-width: 1200px; margin: auto; }
        .watch-card { border: 1px solid gold; padding: 1rem; margin: 1rem; display: inline-block; width: 200px; }
    </style>
</head>
<body>
    <h1>Tiempo y Elegancia</h1>
    <div id="menGrid"></div>
    <div id="womenGrid"></div>

    <script>
        console.log("Iniciando script...");

        const firebaseConfig = {
            apiKey: "AIzaSyCALlXduTs09oIUFcvMqiBhsW4hS-3H9o4",
            authDomain: "relojes-base-de-dato.firebaseapp.com",
            databaseURL: "https://relojes-base-de-dato-default-rtdb.firebaseio.com",
            projectId: "relojes-base-de-dato",
            storageBucket: "relojes-base-de-dato.firebasestorage.app",
            messagingSenderId: "650637629411",
            appId: "1:650637629411:web:bee49527478c5e1037b2d6",
            measurementId: "G-8120GFSTHP"
        };

        try {
            const app = firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            console.log("Firebase inicializado");

            const watchesRef = database.ref('watches');
            watchesRef.on('value', (snapshot) => {
                const data = snapshot.val();
                console.log("Datos recibidos:", data);
                let menHtml = '';
                let womenHtml = '';
                if (data) {
                    Object.entries(data).forEach(([id, watch]) => {
                        const html = `<div class="watch-card"><img src="${watch.image_path}" style="max-width:100%"><h3>${watch.name}</h3><p>${watch.description || ''}</p></div>`;
                        if (watch.gender === 'hombre') menHtml += html;
                        else womenHtml += html;
                    });
                }
                document.getElementById('menGrid').innerHTML = menHtml || '<p>No hay relojes de hombre</p>';
                document.getElementById('womenGrid').innerHTML = womenHtml || '<p>No hay relojes de mujer</p>';
            }, (error) => {
                console.error("Error en Firebase:", error);
                document.body.innerHTML += `<p style="color:red">Error cargando datos: ${error.message}</p>`;
            });
        } catch (err) {
            console.error("Error inicializando Firebase:", err);
            document.body.innerHTML += `<p style="color:red">Error de inicialización: ${err.message}</p>`;
        }
    </script>
</body>
</html>
